<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Portfolio</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="navbar">
    <h1>My Portfolio</h1>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="home" class="section hero">
    <h2 class="fade-in">Hi, I'm a Developer</h2>
    <p class="slide-up">I build modern web apps</p>
    <h3 class="slide-up">I am a <span class="type"></span></h3>
  </section>

  <section id="about" class="section">
    <h2>About Me</h2>
    <p class="reveal">I am learning frontend development...</p>
  </section>

  <section id="projects" class="section">
    <h2 class="reveal">Projects</h2>
    <div class="card-container">
      <div class="card reveal">Project 1</div>
      <div class="card reveal">Project 2</div>
      <div class="card reveal">Project 3</div>
    </div>
  </section>

  <section id="contact" class="section">
    <h2 class="reveal">Contact</h2>
    <form class="contact-form reveal">
      <label class="reveal">
        Name
        <input type="text" name="name" placeholder="Your name" required />
      </label>
      <label class="reveal">
        Email
        <input type="email" name="email" placeholder="you@example.com" required />
      </label>
      <label class="reveal">
        Message
        <textarea name="message" rows="5" placeholder="Write a message..." required></textarea>
      </label>
      <button type="submit" class="reveal">Send Message</button>
      <p class="success-message" hidden>Your message has been sent successfully.</p>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
